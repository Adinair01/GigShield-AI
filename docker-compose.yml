version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: earnshield-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ml-service:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: earnshield-ml
    restart: unless-stopped
    ports:
      - "8000:8000"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: earnshield-backend
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017/earnshield_dev
      - MONGO_DB=earnshield_dev
      - ML_SERVICE_URL=http://ml-service:8000/risk-score
      - ML_FRAUD_SERVICE_URL=http://ml-service:8000/fraud-score
      - JWT_SECRET=supersecret
    depends_on:
      - mongo
      - ml-service
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: earnshield-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE=http://localhost:4000/api
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mongo_data:

